name: V5.0.1 Exact Staging Browser Matrix

on:
  push:
    branches:
      - hotfix/v5.0.1-pdf-stability
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: staging-exact-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-staging-fixtures:
    name: Prepare anonymous staging PDF fixtures
    if: github.event_name == 'workflow_dispatch' || github.run_attempt > 1
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout canonical hotfix commit
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install exact dependencies
        run: npm ci

      - name: Install Chromium runtime
        run: npx playwright install --with-deps chromium

      - name: Prepare missing staging PDF surfaces
        run: npx playwright test -c playwright.staging.config.ts tests/e2e/v501-staging-fixture-setup.spec.ts --project=chromium-desktop --workers=1

      - name: Upload fixture evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-pdf-fixture-evidence
          path: test-results/v501-staging-fixture
          if-no-files-found: ignore
          retention-days: 7

  staging-browser-matrix:
    name: ${{ matrix.label }} staging PDF and route matrix
    needs: prepare-staging-fixtures
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - label: Chromium desktop
            project: chromium-desktop
            browser: chromium
          - label: Firefox desktop
            project: firefox-desktop
            browser: firefox
          - label: WebKit desktop
            project: webkit-desktop
            browser: webkit
          - label: iPhone WebKit
            project: iphone
            browser: webkit
          - label: Android Chromium
            project: android
            browser: chromium
    steps:
      - name: Checkout canonical hotfix commit
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install exact dependencies
        run: npm ci

      - name: Install browser runtime
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run strict staging PDF matrix
        run: npx playwright test -c playwright.staging.config.ts tests/e2e/v501-staging-remote-pdf.spec.ts --project=${{ matrix.project }} --workers=1

      - name: Run critical route regression
        run: npx playwright test -c playwright.staging.config.ts tests/e2e/full-production-regression.spec.ts --project=${{ matrix.project }} --workers=1 --grep "ana route matrisi"

      - name: Upload failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: staging-${{ matrix.project }}-failure-evidence
          path: |
            test-results
            playwright-report
          if-no-files-found: ignore
          retention-days: 7
