services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      APP_URL: ${DOCKER_APP_URL:-https://localhost}
      DATABASE_URL: ${DOCKER_DATABASE_URL:-file:/data/production.db}
      DOCUMENT_STORAGE_DIR: ${DOCKER_DOCUMENT_STORAGE_DIR:-/app/storage/documents}
      BACKUP_DIR: ${DOCKER_BACKUP_DIR:-/app/backups}
    volumes:
      - app-sqlite-data:/data
      - private-documents:/app/storage/documents
      - app-backups:/app/backups
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health',{headers:{'x-forwarded-proto':'https'}}).then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 45s
      retries: 3

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  postgres:
    image: postgres:16-alpine
    profiles:
      - postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-buro_finans}
      POSTGRES_USER: ${POSTGRES_USER:-buro_finans}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-postgres-password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  app-sqlite-data:
  private-documents:
  app-backups:
  postgres-data:
  caddy-data:
  caddy-config:
