<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#111827" />
    <title>Çevrim Dışı - Büro Finans</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #f7f7f8;
        color: #18181b;
        padding: 24px;
      }

      main {
        width: min(100%, 460px);
        border: 1px solid #e5e5e5;
        border-radius: 24px;
        background: #ffffff;
        padding: 24px;
        box-shadow: 0 14px 40px rgba(15, 23, 42, 0.08);
      }

      .mark {
        display: inline-grid;
        width: 48px;
        height: 48px;
        place-items: center;
        border-radius: 18px;
        background: #08111f;
        color: #ffffff;
        font-weight: 800;
        margin-bottom: 18px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 22px;
        line-height: 1.2;
      }

      p {
        margin: 0;
        color: #52525b;
        font-size: 15px;
        line-height: 1.55;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">BF</div>
      <h1>Çevrim dışısınız</h1>
      <p>
        İnternet bağlantısı yok. Veriler güncellenemeyebilir. Bağlantı geri geldiğinde sayfayı
        yenileyerek güncel finans verilerine devam edebilirsiniz.
      </p>
    </main>
  </body>
</html>
